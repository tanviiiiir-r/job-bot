<!DOCTYPE html>
<html>
<head>
  <title>JobBot | Top Jobs</title>
  <style>
    body { font-family: sans-serif; margin: 40px; }
    h1 { color: #333; }
    table { border-collapse: collapse; width: 100%; }
    th, td { padding: 12px; border: 1px solid #ccc; }
    th { background-color: #f0f0f0; }
  </style>
</head>
<body>
  <h1>🚀 Top Matched Jobs</h1>
  <table>
    <tr><th>Title</th><th>Score</th><th>Apply</th></tr>
    {% for title, score, url in jobs %}
    <tr>
      <td>{{ title }}</td>
      <td>{{ score }}</td>
      <td><a href="{{ url }}" target="_blank">🔗 Open</a></td>
    </tr>
    {% endfor %}
  </table>
</body>
</html>
